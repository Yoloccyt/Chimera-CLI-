[target.x86_64-pc-windows-gnu]
# WHY: 使用 "gcc" 而非硬编码路径，让 cargo 从 PATH 中解析 MinGW 链接器。
# 本地开发通过 CLAUDE.md §1 的环境变量将 D:/msys64/mingw64/bin 加入 PATH；
# CI 通过 msys2/setup-msys2@v2 安装 MinGW 后自动注入 PATH。
# 硬编码 D:/msys64/... 在 CI 中失效（runner 只有 C 盘），导致 Windows release 构建失败。
linker = "gcc"

# WHY 固化 incremental = false:rustc 1.96.0 + Windows GNU + incremental compilation
# 存在 ICE(rmeta/encoder.rs:2448 panic "no entry found for key"),导致 cargo check
# 报告伪 warning(mlc-engine/auto-dpo/mcp-mesh/acb-governor)。源码实际干净
# (clippy -D warnings 通过)。禁用 incremental 根治该 ICE,同时与 CLAUDE.md §9
# clippy OOM 缓解(CARGO_INCREMENTAL=0)对齐,避免开发者重复设置环境变量。
# 代价:日常增量编译速度变慢,但项目规模(34 crates)下全量 check 仅 ~7s,可接受。
[build]
incremental = false

# WHY:启用 rusqlite bundled SQLite 的 FTS5 全文索引扩展编译。
# libsqlite3-sys 的 build.rs 读取此环境变量,传递 -DSQLITE_ENABLE_FTS5 给 C 编译器。
# 不设置时 FTS5 不可用,repo-wiki 自动降级到 LIKE 全表扫描(降级策略见 fts.rs)。
[env]
SQLITE_ENABLE_FTS5 = "1"
