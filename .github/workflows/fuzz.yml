name: Fuzz

# ============================================================
# Week 8 限制深度攻坚 — cargo-fuzz CI 集成
#
# 触发:推送 v*.*.*-omega 标签 或 手动触发
# 运行:ubuntu-latest runner + nightly 工具链 + cargo-fuzz
# 时长:6 target × 300s + 编译 ≈ 15-20min(matrix 并行,每个 target 独立 job)
#
# 本地 Windows GNU 无法运行(libFuzzer C++ 与 g++ 不兼容),
# 委托 Linux CI 执行,解除限制 1。
# ============================================================

on:
  push:
    tags:
      - 'v*.*.*-omega'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================
  # Job 1: pre-check — fuzz crate 配置静态验证
  #
  # WHY 此 job 存在:在 fuzz matrix 启动前验证 fuzz/Cargo.toml 配置完整性,
  #   提前发现配置漂移(metadata/bin 声明/target 文件丢失/fuzz_target! 宏缺失等)。
  #   失败时阻塞 6 个 matrix job 启动,避免配置错误导致 6 target × ~5min
  #   编译运行全部失败浪费 CI 资源(约 30min matrix 总时长)。
  #
  # 执行内容:仅 checkout + 运行 scripts/check_fuzz_config.sh shell 脚本,
  #   无需 nightly toolchain 或 cargo-fuzz 安装,典型 <30s 完成。
  # ============================================================
  pre-check:
    name: Fuzz config pre-check
    runs-on: ubuntu-latest
    timeout-minutes: 3  # WHY: 仅 checkout + shell 脚本验证,典型 <30s,3min 兜底防 runner 启动慢或网络抖动
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run fuzz config static validation
        # WHY: 调用 scripts/check_fuzz_config.sh 验证 fuzz crate 配置完整性:
        #   1. fuzz/Cargo.toml 存在
        #   2. cargo-fuzz metadata 声明
        #   3. [lib] path 声明(承载 Windows-GNU stub 宏)
        #   4. 8 个 [[bin]] 声明 + target 文件存在性(6 生产 + 2 stub 宏测试)
        #   5. 每个 fuzz target 包含 fuzz_target! 宏调用
        #   6. 被测 crate path 依赖目录存在
        # 失败时退出码 1,阻塞后续 fuzz job 启动(配置漂移意味着 fuzz 可能无效)
        shell: bash
        run: |
          chmod +x scripts/check_fuzz_config.sh
          ./scripts/check_fuzz_config.sh

  # ============================================================
  # Job 2: fuzz — 6 target × 300s matrix 实际执行
  # ============================================================
  fuzz:
    name: Fuzz (${{ matrix.target }})
    needs: pre-check  # WHY: 配置预检通过后再启动 fuzz matrix,避免配置错误导致 6 个 job 全部失败浪费 CI 资源
    runs-on: ubuntu-latest
    timeout-minutes: 20  # WHY: 6 target × 300s + 编译 ≈ 15-20min(matrix 并行,每个 target 独立 job),20min 兜底防止 fuzz hang 占用 nightly runner
    strategy:
      fail-fast: false
      matrix:
        target:
          - quest_parse
          - seccore_sandbox
          - event_serialize
          - cacr_budget_parse
          - checkpoint_deserialize
          - config_section_parse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: fuzz-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            fuzz-${{ matrix.target }}-cargo-

      - name: Install cargo-fuzz
        # WHY: --locked 锁定 Cargo.lock,防止 cargo-fuzz 上游 minor 版本引入
        #      破坏性变更导致 CI 间歇性失败(reproducibility 优先)。
        # WHY +nightly: 仓库 rust-toolchain.toml 默认 channel 为 stable-x86_64-pc-windows-gnu,
        #      在 Linux runner 上会导致 "target tuple in channel name" 错误;
        #      显式 +nightly 绕过 toolchain 文件,使用本 job 已安装的 nightly。
        run: cargo +nightly install cargo-fuzz --locked

      - name: Run fuzz target (${{ matrix.target }})
        working-directory: ./fuzz
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=300 -print_final_stats=1 2>&1 | tee fuzz_${{ matrix.target }}.log

      - name: Upload fuzz log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-log-${{ matrix.target }}
          path: fuzz/fuzz_${{ matrix.target }}.log
          retention-days: 30

      - name: Upload crash inputs (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/crash-*
          retention-days: 90
          if-no-files-found: ignore
