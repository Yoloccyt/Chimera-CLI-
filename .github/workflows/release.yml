name: Release

# ============================================================
# Week 8 Task 4 — 跨平台发布 CI/CD
#
# 触发:推送 v*.*.*-omega 标签(如 v1.0.0-omega)
# 产物:5 平台 binary + GitHub Release
# Matrix:Windows x86_64 · Linux x86_64/aarch64 · macOS x86_64/aarch64
# ============================================================

on:
  push:
    tags:
      # WHY: 仅保留通配模式 v*.*.*-omega,已覆盖 v1.0.0-omega;
      # 显式列举具体版本会造成后续发版需手动追加,违反 DRY
      - 'v*.*.*-omega'
  # WHY: PR 触发 test job,在合并前验证 Cargo.toml/Cargo.lock/crates 修改
  # 不破坏既有测试基线;build/docker/release 仍仅 tag 触发(见各 job if 条件)
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.github/workflows/**'
  workflow_dispatch:  # 允许手动触发,便于调试

permissions:
  contents: write  # 创建 GitHub Release 需要

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # WHY: panic=abort 下 release binary 无 unwind 表,线上 panic 默认无栈可追;
  #      全局开启 RUST_BACKTRACE=1 让 build/test/docker/release 所有 job 在
  #      panic 时输出 backtrace,便于 CI 日志定位根因(对应 §10.5 P1 修复)
  RUST_BACKTRACE: 1

jobs:
  # ============================================================
  # Job 1: 5 平台 Matrix 构建
  # ============================================================
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30  # WHY: 5 平台 matrix × release LTO 编译典型 8-15min,30min 兜底防卡死
    # WHY: build 仅 tag 触发;PR 时仅跑 test job 验证逻辑正确性,不重复 5 平台 release 编译
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false  # 单平台失败不阻塞其他平台
      matrix:
        include:
          # Windows x86_64 — GNU 工具链(项目默认工具链)
          - target: x86_64-pc-windows-gnu
            runner: windows-latest
            cross: false
            # WHY: 显式指定 GNU channel,避免 dtolnay/rust-toolchain@stable 在 Windows 上
            # 默认安装 MSVC 工具链后再被 rust-toolchain.toml 切换,造成 toolchain 冲突
            toolchain: stable-x86_64-pc-windows-gnu
            artifact_name: chimera-windows-x86_64.exe
            binary_name: aether.exe
          # Linux x86_64 — 主力服务器平台
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            artifact_name: chimera-linux-x86_64
            binary_name: aether
          # Linux aarch64 — ARM 服务器(交叉编译,需 cross)
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
            artifact_name: chimera-linux-aarch64
            binary_name: aether
          # macOS x86_64 — Intel Mac
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
            artifact_name: chimera-macos-x86_64
            binary_name: aether
          # macOS aarch64 — Apple Silicon (M1/M2/M3)
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
            artifact_name: chimera-macos-aarch64
            binary_name: aether

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        # WHY: 使用 @master 以支持 matrix.toolchain 变量输入;action 本身稳定,
        # 且 matrix 显式锁定 channel,避免 drift
        uses: dtolnay/rust-toolchain@master
        with:
          # Windows 使用 matrix 指定的 GNU channel;其他平台回退到 stable
          toolchain: ${{ matrix.toolchain || 'stable' }}
          targets: ${{ matrix.target }}

      # WHY: rust-toolchain.toml 默认 channel 为 stable-x86_64-pc-windows-gnu,
      # 在 Linux/macOS runner 上会导致 toolchain 选择冲突。Windows 已由 matrix
      # 显式安装 GNU 工具链,无需覆盖;非 Windows 平台通过 RUSTUP_TOOLCHAIN 强制
      # 使用 stable,确保跨平台 matrix 使用正确的 host toolchain。
      - name: Override toolchain for non-Windows runners
        if: runner.os != 'Windows'
        shell: bash
        run: echo "RUSTUP_TOOLCHAIN=stable" >> $GITHUB_ENV

      # WHY: dtolnay/rust-toolchain 安装 target-specific toolchain 后,
      # 仍需显式设为 default,避免 rust-toolchain.toml 与 action 安装的 toolchain
      # 竞争导致实际编译使用错误工具链
      - name: Ensure Windows GNU toolchain is default
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: bash
        run: |
          rustup default stable-x86_64-pc-windows-gnu
          rustup show

      # WHY: repo-wiki 使用 rusqlite bundled + FTS5,Linux 上需要 sqlite3 开发头文件;
      # 某些 runner 镜像可能未预装,显式安装避免链接失败。
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config

      # WHY MinGW:Windows GNU target 需要 gcc.exe 链接器,windows-latest runner
      # 默认不安装 MinGW;本地 .cargo/config.toml 指向 D:/msys64/mingw64/bin/gcc.exe,
      # CI 需安装 MSYS2 并通过环境变量覆盖 linker 路径(对应 §10.5 P1 已知短板)
      - name: Setup MSYS2 and MinGW (Windows GNU target)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: gcc
          path-type: inherit

      - name: Configure MinGW linker for CI
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: bash
        run: |
          # WHY 动态路径:msys2/setup-msys2 在不同 runner image 上安装路径可能不同
          # (如 windows-2025-vs2026 实际将 MinGW 安装到 C:/mingw64,而非 C:/msys64)。
          # 通过 which gcc 获取实际路径,避免硬编码路径不匹配导致 linker not found。
          # 根因见 v1.5.1-omega release run 29156147195:硬编码 C:/msys64/mingw64/bin/gcc.exe
          # 在 runner 上实际路径为 C:/mingw64/bin/gcc, cargo 报 "linker not found"。
          GCC_PATH=$(which gcc)
          if [ -z "$GCC_PATH" ]; then
            echo "Error: gcc not found in PATH after MSYS2 setup" >&2
            exit 1
          fi
          # cargo 在 Windows 上需要 Windows 风格绝对路径,cygpath 将 MSYS 路径转换。
          GCC_WIN_PATH=$(cygpath -w "$GCC_PATH")
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$GCC_WIN_PATH" >> $GITHUB_ENV
          # WHY: cargo 除了 linker 外还需要 ar/windres 等 MinGW 工具,必须将
          # gcc 所在目录加入 PATH,否则链接阶段会因找不到 ar 而失败。
          MINGW_BIN_DIR=$(dirname "$GCC_PATH")
          echo "$MINGW_BIN_DIR" >> $GITHUB_PATH
          echo "Detected MinGW linker: $GCC_PATH -> $GCC_WIN_PATH"

      - name: Verify MinGW toolchain (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: bash
        run: |
          which gcc || echo "gcc not in PATH"
          which ar || echo "ar not in PATH"
          gcc --version || true
          ar --version || true

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # WHY: 优先使用 crates.io 稳定版 cross,避免 --git 在 runner 上因网络或权限失败;
      # --locked 锁定依赖版本,确保可复现构建。
      - name: Install cross (for aarch64-linux)
        if: matrix.cross
        run: cargo install cross --locked

      # WHY: 在 Linux/macOS 上 cargo 找不到 cross 时给出清晰错误,避免静默失败。
      - name: Verify cross availability
        if: matrix.cross
        shell: bash
        run: |
          which cross || echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          cross --version

      - name: Build binary
        shell: bash
        run: |
          # WHY: Windows GNU 构建失败时日志难定位,先输出 toolchain/路径信息
          # 便于在 annotations 中快速诊断
          echo "=== Rust toolchain info ==="
          rustup show || true
          rustc --version || true
          cargo --version || true
          echo "=== MinGW toolchain info ==="
          which gcc || true
          which ar || true
          echo "=== Build start ==="
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p chimera-cli 2>&1 | tee build.log
          else
            cargo build --release --target ${{ matrix.target }} -p chimera-cli 2>&1 | tee build.log
          fi
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "=== Build failed; emitting annotations ==="
            grep -E '^(error|warning)(\[.*\])?:' build.log | head -30 | while IFS= read -r line; do
              echo "::error::$line"
            done
            echo "=== Build failed; last 100 lines ==="
            tail -n 100 build.log
            exit "$BUILD_EXIT"
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.target }}
          path: build.log
          retention-days: 7

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          if [ -f "$BIN_PATH" ]; then
            strip "$BIN_PATH" || echo "strip skipped (tool unavailable)"
          fi

      - name: Rename to artifact name
        shell: bash
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          cp "$BIN_PATH" "${{ matrix.artifact_name }}"

      - name: Verify binary runs
        shell: bash
        run: |
          ./${{ matrix.artifact_name }} --version || echo "version check skipped"

      - name: Verify binary size < 50MB
        shell: bash
        run: |
          # WHY 50MB 体积红线:release profile 已配置 strip/lto/opt-level=z,
          # 典型 binary 7-15MB;超 50MB 说明体积优化失效或引入了重量级依赖
          BIN_PATH="${{ matrix.artifact_name }}"
          BINARY_SIZE=$(stat -c%s "$BIN_PATH" 2>/dev/null || stat -f%z "$BIN_PATH" 2>/dev/null || wc -c < "$BIN_PATH")
          echo "Binary size: $BINARY_SIZE bytes (${{ matrix.artifact_name }})"
          if [ "$BINARY_SIZE" -gt 52428800 ]; then
            echo "ERROR: Binary size $BINARY_SIZE bytes exceeds 50MB (52428800 bytes) limit"
            exit 1
          fi
          echo "OK: Binary size $BINARY_SIZE bytes < 50MB limit"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30

  # ============================================================
  # Job 2: 全 workspace 测试(不阻塞 matrix 构建)
  # ============================================================
  test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30  # WHY: workspace 全量测试典型 5-12min,30min 兜底防卡死
    # WHY: PR + tag 双触发 — PR 时验证修改不破坏测试基线,tag 时作为发布前最终验证;
    #      workflow_dispatch 调试不触发(避免重复跑全量测试)
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # WHY: 与 build job 保持一致,避免 rust-toolchain.toml 的 Windows GNU channel
      # 在 Linux runner 上导致 toolchain 选择问题。
      - name: Override toolchain for Linux
        shell: bash
        run: echo "RUSTUP_TOOLCHAIN=stable" >> $GITHUB_ENV
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-test-cargo-
      # WHY: 与本地 Windows --jobs 1 保持一致,避免 Ubuntu runner 内存不足导致 OOM;
      # 同时加 --no-fail-fast 便于一次看到所有失败测试。通过 tee 捕获日志,
      # 失败时输出最后 200 行到 job 日志,无需下载完整日志即可定位失败用例。
      - name: Run workspace tests
        shell: bash
        run: |
          cargo test --workspace --jobs 1 --no-fail-fast 2>&1 | tee test.log
          TEST_EXIT=${PIPESTATUS[0]}
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "=== cargo test failed with exit code $TEST_EXIT; last 200 lines ==="
            tail -n 200 test.log
            exit "$TEST_EXIT"
          fi

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 7

  # ============================================================
  # Job 2.5: Docker 镜像构建 + 推送 GHCR
  # ============================================================
  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30  # WHY: docker build+push+验证典型 4-8min,30min 兜底防 registry 网络抖动卡死
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write  # GHCR 推送权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image_name
        run: |
          # WHY 仓库名可能以连字符结尾(如 Yoloccyt/Chimera-CLI-),直接转小写后
          # 得到 ghcr.io/yoloccyt/chimera-cli-,末尾连字符违反 Docker reference format,
          # 导致 buildx 报错 "invalid reference format"。先转小写再移除末尾连字符。
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          REPO_LOWER="${REPO_LOWER%-}"
          echo "image=ghcr.io/$REPO_LOWER" >> "$GITHUB_OUTPUT"
          echo "Normalized image: ghcr.io/$REPO_LOWER"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_name.outputs.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-rc') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # WHY 注入 VERSION build-arg:让 Dockerfile L49 的 ARG VERSION 接收实际 git tag,
          # 使 LABEL org.opencontainers.image.version 与 Release 版本一致,避免镜像元数据漂移
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image size < 100MB
        run: |
          # WHY 先 pull 再 inspect:docker buildx build --push 仅推送镜像到 registry,
          # 不会在本地 Docker 存储中保留镜像;直接 docker image inspect 会报
          # "No such image" 错误。先 pull 拉取到本地,再 inspect 获取体积。
          # 使用统一归一化的 image name:docker/metadata-action@v5 默认将 images
          # 转为小写推送,但 ${{ github.repository }} 保留原大小写,直接用会导致
          # docker image inspect 找不到镜像(大小写不匹配)。末尾连字符问题已由
          # Normalize image name step 处理。
          IMAGE="${{ steps.image_name.outputs.image }}:${{ github.ref_name }}"
          docker pull "$IMAGE"
          IMAGE_SIZE=$(docker image inspect "$IMAGE" --format='{{.Size}}')
          echo "Image size: $IMAGE_SIZE bytes"
          if [ "$IMAGE_SIZE" -gt 104857600 ]; then
            echo "ERROR: Image size exceeds 100MB limit"
            exit 1
          fi
          echo "OK: Image size within 100MB limit"

      - name: Verify image functionality (--version)
        run: |
          # WHY 显式 docker pull:虽然 build-push-action 已推送镜像,但本地缓存不等于
          # 用户可拉取。此步骤模拟真实用户安装路径,验证 GHCR 上的镜像可被公开拉取。
          IMAGE="${{ steps.image_name.outputs.image }}:${{ github.ref_name }}"
          echo "Pulling image: $IMAGE"
          docker pull "$IMAGE"

          # 运行 --version 验证 binary 功能正常(distroless 镜像无 shell,直接执行 binary)
          echo "Running: docker run --rm $IMAGE --version"
          VERSION_OUTPUT=$(docker run --rm "$IMAGE" --version)
          echo "Version output: $VERSION_OUTPUT"

          # 验证输出格式:必须匹配 aether|chimera X.Y.Z[-omega](确保 binary 未损坏)
          if ! echo "$VERSION_OUTPUT" | grep -qE '^(aether|chimera) [0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: --version output does not match expected format"
            echo "Expected: aether|chimera X.Y.Z[-omega]"
            echo "Actual: $VERSION_OUTPUT"
            exit 1
          fi
          echo "OK: Image functionality verified (--version output valid)"

  # ============================================================
  # Job 2.6: 构建 Debian .deb 包
  # ============================================================
  deb:
    name: Build Debian package
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: chimera-linux-x86_64
          path: ./artifacts

      - name: Build .deb package
        run: |
          chmod +x ./artifacts/chimera-linux-x86_64
          mkdir -p debian-pkg/usr/bin debian-pkg/DEBIAN
          mv ./artifacts/chimera-linux-x86_64 debian-pkg/usr/bin/chimera
          sed "s/^Version: .*/Version: ${GITHUB_REF_NAME#v}/" packaging/apt/chimera-cli.control > debian-pkg/DEBIAN/control
          dpkg-deb --build debian-pkg "chimera-cli_${GITHUB_REF_NAME#v}_amd64.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: chimera-cli-deb
          path: chimera-cli_*_amd64.deb

  # ============================================================
  # Job 3: 汇总所有平台产物,创建 GitHub Release
  # ============================================================
  release:
    name: Publish GitHub Release
    needs: [build, test, docker, deb]
    runs-on: ubuntu-latest
    timeout-minutes: 30  # WHY: 产物下载+Release 创建典型 1-3min,30min 兜底防 GitHub API 抖动
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts (debug)
        run: ls -laR artifacts

      - name: Generate checksums.txt
        # WHY: install.sh line 216-260 和 install.ps1 line 199-242 会从 Release 下载
        # checksums.txt 做 SHA256 校验,缺失则校验空转(warn 跳过)。此 step 生成
        # 与两端解析逻辑对齐的格式(<64-hex>  <filename> 双空格),并校验 5 平台
        # binary + 1 个 .deb 共 6 项产物全部纳入(防止 matrix 部分失败导致 checksums 不完整)。
        run: |
          cd artifacts
          find . -type f | sort | while IFS= read -r f; do
            bn=$(basename "$f")
            hash=$(sha256sum "$f" | awk '{print $1}')
            printf '%s  %s\n' "$hash" "$bn"
          done > ../checksums.txt
          EXPECTED_COUNT=6
          ACTUAL_COUNT=$(wc -l < ../checksums.txt | tr -d ' ')
          if [ "$ACTUAL_COUNT" -ne "$EXPECTED_COUNT" ]; then
            echo "::error::Expected $EXPECTED_COUNT artifacts in checksums.txt, got $ACTUAL_COUNT"
            exit 1
          fi
          echo "checksums.txt generated ($ACTUAL_COUNT entries):"
          cat ../checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Chimera CLI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*/*
            checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## Chimera CLI (NEXUS-OMEGA) ${{ github.ref_name }}

            ### 平台支持
            | 平台 | 文件 | 架构 |
            |------|------|------|
            | Windows | `chimera-windows-x86_64.exe` | x86_64 |
            | Linux   | `chimera-linux-x86_64`       | x86_64 |
            | Linux   | `chimera-linux-aarch64`      | aarch64 (ARM) |
            | macOS   | `chimera-macos-x86_64`       | Intel |
            | macOS   | `chimera-macos-aarch64`      | Apple Silicon |

            ### 包管理器安装
            | 平台 | 命令 |
            |------|------|
            | macOS / Linux (Homebrew) | `brew tap yoloccyt/chimera-cli && brew install chimera-cli` |
            | Windows (Scoop) | `scoop bucket add chimera-cli https://github.com/Yoloccyt/scoop-chimera-cli.git && scoop install chimera-cli` |
            | Debian / Ubuntu | `sudo apt install ./chimera-cli_${GITHUB_REF_NAME#v}_amd64.deb` |

            完整终端安装指南参见 [docs/release/v1.5.1-omega_installation_guide.md](docs/release/v1.5.1-omega_installation_guide.md)。

            ### 验证
            ```bash
            chimera --version
            ```

            ### Docker
            ```bash
            # 拉取 GHCR 镜像(distroless,< 100MB,非 root 运行)
            docker pull ghcr.io/${GITHUB_REPOSITORY,,%%-}:${GITHUB_REF_NAME}
            # 验证镜像可用性(应输出版本号)
            docker run --rm ghcr.io/${GITHUB_REPOSITORY,,%%-}:${GITHUB_REF_NAME} --version
            ```
