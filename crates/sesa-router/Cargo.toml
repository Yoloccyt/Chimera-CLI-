[package]
name = "sesa-router"
version.workspace = true
edition.workspace = true

[dependencies]
# 异步运行时:timeout 超时控制 + spawn 后台订阅任务
tokio = { workspace = true }
# 配置与类型序列化(#[derive(Serialize, Deserialize)])
serde = { workspace = true, features = ["derive"] }
# 应用层错误(顶层调用方使用,库层用 thiserror)
anyhow = { workspace = true }
# 库层错误类型标准(§4.1:库层用自定义 thiserror enum)
thiserror = { workspace = true }
# 结构化日志(事件发布失败、稀疏度告警)
tracing = { workspace = true }
# 并发安全专家注册表(O(1) 分片查找)
dashmap = { workspace = true }
# L1 Core:跨层通信唯一通道,发布 SesaActivationCompleted 事件
event-bus = { path = "../event-bus" }
# L1 Core:CLV 余弦相似度(用于专家评分计算)
nexus-core = { path = "../nexus-core" }

[dev-dependencies]
# 性能基准框架(SubTask 3.7)
criterion = { workspace = true }
# JSON 序列化测试(config serde 往返)
serde_json = { workspace = true }
# 属性测试框架 — 稀疏化不变量验证
proptest = { workspace = true }
# 三层路由组合基准(Task 4 / W7-Carryover-1):串联 SESA → KVBSR → FaaE
# WHY dev-dep 而非 dep:基准仅在 bench target 中使用,不影响运行时依赖图
kvbsr-router = { path = "../kvbsr-router" }
faae-router = { path = "../faae-router" }

# 性能基准配置:harness=false 以使用 criterion 自定义 main
[[bench]]
name = "router_benchmark"
harness = false

# 三层路由组合基准(Task 4):SESA 激活 → KVBSR 路由 → FaaE 工具选择
[[bench]]
name = "three_layer_routing"
harness = false
